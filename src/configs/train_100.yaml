# @package _global_

defaults:
  - /model: deepspeech2
  - /text_encoder: ctc_text_encoder
  - /loss: ctc_loss
  - _self_

trainer:
  n_epochs: 25
  save_period: 1
  max_grad_norm: 1.0
  device: "auto"
  device_tensors: ["spectrogram", "text_encoded"]
  log_step: 50
  skip_oom: True
  save_dir: "outputs"
  monitor: "min val_cer"
  seed: 42
  override: True
  cudnn_benchmark: True
  precision: 16

model:
  _target_: src.model.deepspeech2.DeepSpeech2
  n_tokens: 29
  n_feats: 80
  dim: 512
  n_channels: 48
  gru_layers: 5
  dropout: 0.3

text_encoder:
  _target_: src.text_encoder.ctc_text_encoder.CTCTextEncoder
  decoder_type: argmax
  beam_size: 10

loss_function:
  _target_: src.loss.ctc_loss.CTCLossWrapper
  blank: 0
  zero_infinity: true
  reduction: mean

transforms:
  instance_transforms:
    train:
      get_spectrogram:
        _target_: torchaudio.transforms.MelSpectrogram
        sample_rate: 16000
        n_mels: 80
        n_fft: 400
        hop_length: 160
        power: 1.0
    inference:
      get_spectrogram:
        _target_: torchaudio.transforms.MelSpectrogram
        sample_rate: 16000
        n_mels: 80
        n_fft: 400
        hop_length: 160
        power: 1.0
  batch_transforms:
    train: null
    inference: null

writer:
  _target_: src.logger.TensorBoardWriter
  run_name: test_100
  id_length: 8
  loss_names: ["loss"]
  log_checkpoints: true

dataloader:
  batch_size: 128
  num_workers: 12
  shuffle: true
  pin_memory: true
  prefetch_factor: 4
  persistent_workers: true

optimizer:
  _target_: torch.optim.AdamW
  lr: 0.0001
  weight_decay: 0.0001

lr_scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: 25
  eta_min: 0.00001

metrics:
  train:
    - _target_: src.metrics.cer.CERMetric
      name: cer
    - _target_: src.metrics.wer.WERMetric
      name: wer
  inference:
    - _target_: src.metrics.cer.CERMetric
      name: cer
    - _target_: src.metrics.wer.WERMetric
      name: wer

paths:
  output_dir: ${hydra:runtime.output_dir}

datasets:
  train:
    _target_: src.datasets.librispeech_dataset.LibrispeechDataset
    part: train-clean-100
    target_sr: 16000
    max_audio_length: 15
    max_text_length: 300
    shuffle_index: True
    instance_transforms: ${transforms.instance_transforms.train}
  validation:
    _target_: src.datasets.librispeech_dataset.LibrispeechDataset
    part: dev-clean
    target_sr: 16000
    max_audio_length: 15
    max_text_length: 300
    shuffle_index: False
    instance_transforms: ${transforms.instance_transforms.inference}
