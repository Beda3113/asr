# @package _global_

defaults:
  - model: deepspeech2
  - _self_

model:
  _target_: src.model.DeepSpeech2
  n_tokens: 28
  n_feats: 80
  dim: 512
  n_channels: 48
  gru_layers: 5
  dropout: 0.3

text_encoder:
  _target_: src.text_encoder.CTCTextEncoder
  decoder_type: argmax
  beam_size: 10

inferencer:
  device_tensors: ["spectrogram", "text_encoded"]
  device: auto
  from_pretrained: "outputs/test_100/checkpoint-epoch1.pth"
  save_path: "predictions/test_100"
  seed: 42

dataloader:
  _target_: torch.utils.data.DataLoader
  batch_size: 8
  num_workers: 2
  pin_memory: True
  shuffle: False
  drop_last: False

datasets:
  test:
    _target_: src.datasets.LibrispeechDataset
    part: "test-clean"
    target_sr: 16000
    instance_transforms:
      get_spectrogram:
        _target_: torchaudio.transforms.MelSpectrogram
        sample_rate: 16000
        n_mels: 80
        n_fft: 400
        hop_length: 160
        power: 1.0

transforms:
  instance_transforms:
    inference:
      get_spectrogram:
        _target_: torchaudio.transforms.MelSpectrogram
        sample_rate: 16000
        n_mels: 80
        n_fft: 400
        hop_length: 160
        power: 1.0
  batch_transforms:
    inference: null

metrics:
  inference:
    - _target_: src.metrics.CERMetric
      name: "CER"
    - _target_: src.metrics.WERMetric
      name: "WER"